version: '3.8'
 
services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: launchport-backend
    ports:
      - "5000:5000"
      - "3001:3001"
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_PATH=/data/platform.db
      - CORS_ORIGIN=http://localhost:3000,http://localhost:5173,http://dashboard.launchport.org,https://dashboard.launchport.org
    volumes:
      - ./data:/data
      - /app/deployed-projects:/app/deployed-projects
    networks:
      - launchport-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: launchport-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - launchport-net
    restart: unless-stopped
 
networks:
  launchport-net:
    driver: bridge
